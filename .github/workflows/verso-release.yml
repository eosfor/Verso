name: Verso Release

on:
  push:
    tags:
      - "verso-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version number (e.g. 1.0.0)"
        required: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            TAG="${GITHUB_REF#refs/tags/verso-v}"
            echo "version=$TAG" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Bundle blazor.web.js for CLI
        run: |
          # blazor.web.js is embedded in Components.Endpoints.dll in .NET 8/9
          # but not in .NET 10+. Extract it so verso serve works when the tool
          # rolls forward to a runtime that no longer bundles the script.
          DIR="src/Verso.Cli/bin/Release/net8.0/wwwroot/_framework"
          mkdir -p "$DIR"
          DLL=$(find "$DOTNET_ROOT/shared/Microsoft.AspNetCore.App" \
                -path "*/8.*/Microsoft.AspNetCore.Components.Endpoints.dll" | head -1)
          if [ -z "$DLL" ]; then
            echo "::warning::Could not find .NET 8 Components.Endpoints.dll"
            exit 0
          fi
          dotnet new console -o /tmp/_ebjs --no-restore -f net8.0
          cat > /tmp/_ebjs/Program.cs << 'EOF'
          var asm = System.Reflection.Assembly.LoadFrom(args[0]);
          using var s = asm.GetManifestResourceStream("_framework/blazor.web.js");
          if (s == null) { Console.Error.WriteLine("Resource not found"); return; }
          Directory.CreateDirectory(Path.GetDirectoryName(args[1])!);
          using var f = File.Create(args[1]);
          s.CopyTo(f);
          Console.WriteLine($"Extracted blazor.web.js ({f.Length} bytes)");
          EOF
          dotnet run --project /tmp/_ebjs -- "$DLL" "$DIR/blazor.web.js"

      - name: Build
        run: dotnet build Verso.sln -c Release -p:Version=${{ steps.version.outputs.version }}

      - name: Test
        run: dotnet test Verso.sln -c Release --no-build

      - name: Pack NuGet packages
        run: |
          dotnet pack src/Verso.Abstractions/Verso.Abstractions.csproj -c Release -p:Version=${{ steps.version.outputs.version }} -o packages
          dotnet pack src/Verso/Verso.csproj -c Release -p:Version=${{ steps.version.outputs.version }} -o packages
          dotnet pack src/Verso.Ado/Verso.Ado.csproj -c Release -p:Version=${{ steps.version.outputs.version }} -o packages
          dotnet pack src/Verso.FSharp/Verso.FSharp.csproj -c Release -p:Version=${{ steps.version.outputs.version }} -o packages
          dotnet pack src/Verso.JavaScript/Verso.JavaScript.csproj -c Release -p:Version=${{ steps.version.outputs.version }} -o packages
          dotnet pack src/Verso.PowerShell/Verso.PowerShell.csproj -c Release -p:Version=${{ steps.version.outputs.version }} -o packages
          dotnet pack src/Verso.Testing/Verso.Testing.csproj -c Release -p:Version=${{ steps.version.outputs.version }} -o packages
          dotnet pack templates/Verso.Templates/Verso.Templates.csproj -c Release -p:Version=${{ steps.version.outputs.version }} -o packages
          dotnet pack src/Verso.Cli/Verso.Cli.csproj -c Release -p:Version=${{ steps.version.outputs.version }} -o packages

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: packages/*.nupkg

  build-vsix:
    name: Build VSIX
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Set version
        run: npm version ${{ needs.build-and-test.outputs.version }} --no-git-tag-version
        working-directory: vscode

      - name: Install dependencies
        run: npm ci
        working-directory: vscode

      - name: Build all
        run: npm run build:all
        working-directory: vscode

      - name: Package VSIX
        run: npx vsce package --skip-license
        working-directory: vscode

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: verso-vsix
          path: vscode/*.vsix

  publish-nuget:
    name: Publish to NuGet
    runs-on: ubuntu-latest
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/verso-v')

    steps:
      - name: Download NuGet packages
        uses: actions/download-artifact@v4
        with:
          name: nuget-packages
          path: packages

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Push to NuGet.org
        run: |
          for pkg in packages/*.nupkg; do
            echo "Publishing $pkg..."
            dotnet nuget push "$pkg" \
              --api-key "${{ secrets.NUGET_VERSO_API_KEY }}" \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate
          done

  publish-vsix:
    name: Publish to VS Code Marketplace
    runs-on: ubuntu-latest
    needs: [build-and-test, build-vsix]
    if: startsWith(github.ref, 'refs/tags/verso-v')

    steps:
      - name: Download VSIX
        uses: actions/download-artifact@v4
        with:
          name: verso-vsix
          path: vsix

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Publish to Marketplace
        run: npx @vscode/vsce publish --packagePath vsix/*.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-and-test, build-vsix, publish-nuget, publish-vsix]
    if: startsWith(github.ref, 'refs/tags/verso-v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download NuGet packages
        uses: actions/download-artifact@v4
        with:
          name: nuget-packages
          path: packages

      - name: Download VSIX
        uses: actions/download-artifact@v4
        with:
          name: verso-vsix
          path: vsix

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            packages/*.nupkg
            vsix/*.vsix
